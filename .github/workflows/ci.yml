name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  workspace-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build workspaces
        run: npm run build
      - name: Lint/typecheck workspaces
        run: npm run lint:workspaces

  spec-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate OpenSpec traceability coverage
        run: npm run check:spec-coverage

  system-card-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Regenerate and verify trust system card outputs are committed
        run: npm run check:system-card

  tool-docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Regenerate and verify tool reference docs are committed
        run: npm run check:tool-docs

  site-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build site and validate internal links
        run: npm run check:site

  mcpb-manifest-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate MCPB manifest/tool contract
        run: npm run check:mcpb-manifest

  allure-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate Allure hierarchy labels
        run: npm run check:allure-labels
      - name: Enforce Allure filename migration policy
        run: npm run check:allure-filenames

  workspace-test:
    runs-on: ubuntu-latest
    needs: workspace-lint
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Build workspaces
        run: npm run build
      - name: Test workspaces
        run: npm run test

  package-smoke:
    runs-on: ubuntu-latest
    needs: workspace-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Package-level smoke tests
        run: |
          npm run test:run -w @usejunior/docx-core
          npm run test:run -w @usejunior/docx-primitives
          npm run test:run -w @usejunior/docx-mcp
          npm run test:run -w @usejunior/safedocx-mcpb

  mcpb-bundle:
    runs-on: ubuntu-latest
    needs: package-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build and pack safe-docx MCP bundle
        run: npm run pack:mcpb
      - name: Upload MCPB bundle artifact (main only)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: safe-docx-mcpb
          if-no-files-found: error
          path: packages/safe-docx-mcpb/safe-docx.mcpb

  deploy-allure:
    if: github.ref == 'refs/heads/main'
    needs: workspace-test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate Allure report
        run: npm run allure:generate
      - name: Brand Allure report
        run: npm run allure:brand
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report-repo
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  package-coverage:
    runs-on: ubuntu-latest
    needs: workspace-test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run package coverage suites
        run: npm run test:coverage:packages
      - name: Generate package coverage dashboard + enforce ratchet
        run: |
          mkdir -p coverage
          npm run coverage:packages:check > coverage/package-coverage-table.txt
          cat coverage/package-coverage-table.txt
      - name: Upload package coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: package-coverage
          if-no-files-found: error
          path: |
            coverage/package-coverage-baseline.json
            coverage/package-coverage-summary.json
            coverage/package-coverage-table.txt
            packages/docx-core/coverage/coverage-summary.json
            packages/docx-primitives/coverage/coverage-summary.json
            packages/docx-mcp/coverage/coverage-summary.json
            packages/docx-core/coverage/lcov.info
            packages/docx-primitives/coverage/lcov.info
            packages/docx-mcp/coverage/lcov.info
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./packages/docx-core/coverage/lcov.info,./packages/docx-primitives/coverage/lcov.info,./packages/docx-mcp/coverage/lcov.info
          use_oidc: true
          fail_ci_if_error: true
